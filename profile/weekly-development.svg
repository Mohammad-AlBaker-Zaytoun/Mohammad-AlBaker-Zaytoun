<svg xmlns="http://www.w3.org/2000/svg" width="760" height="196" viewBox="0 0 760 196" role="img" aria-labelledby="title desc">
  <title id="title">Weekly Development Breakdown</title>
  <desc id="desc">TypeScript 52.8 percent, JavaScript 21.3 percent, Python 13.7 percent, CSS 7.8 percent, HTML 4.4 percent.</desc>

  <style>
    .card { fill: #f6f8fa; stroke: #d0d7de; }
    .label { fill: #24292f; font: 600 15px -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
    .value { fill: #57606a; font: 600 14px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
    .track { fill: #d8dee4; }
    .bar { fill: #0969da; }

    @media (prefers-color-scheme: dark) {
      .card { fill: #161b22; stroke: #30363d; }
      .label { fill: #f0f6fc; }
      .value { fill: #c9d1d9; }
      .track { fill: #30363d; }
      .bar { fill: #00d9ff; }
    }
  </style>

  <rect class="card" x="0.5" y="0.5" width="759" height="195" rx="12" />

  <g transform="translate(24 24)">
    <text class="label" x="0" y="13">TypeScript</text>
    <rect class="track" x="124" y="0" width="480" height="16" rx="8" />
    <rect class="bar" x="124" y="0" width="253.44" height="16" rx="8" />
    <text class="value" x="624" y="13">52.8%</text>
  </g>

  <g transform="translate(24 58)">
    <text class="label" x="0" y="13">JavaScript</text>
    <rect class="track" x="124" y="0" width="480" height="16" rx="8" />
    <rect class="bar" x="124" y="0" width="102.24" height="16" rx="8" />
    <text class="value" x="624" y="13">21.3%</text>
  </g>

  <g transform="translate(24 92)">
    <text class="label" x="0" y="13">Python</text>
    <rect class="track" x="124" y="0" width="480" height="16" rx="8" />
    <rect class="bar" x="124" y="0" width="65.76" height="16" rx="8" />
    <text class="value" x="624" y="13">13.7%</text>
  </g>

  <g transform="translate(24 126)">
    <text class="label" x="0" y="13">CSS</text>
    <rect class="track" x="124" y="0" width="480" height="16" rx="8" />
    <rect class="bar" x="124" y="0" width="37.44" height="16" rx="8" />
    <text class="value" x="624" y="13">7.8%</text>
  </g>

  <g transform="translate(24 160)">
    <text class="label" x="0" y="13">HTML</text>
    <rect class="track" x="124" y="0" width="480" height="16" rx="8" />
    <rect class="bar" x="124" y="0" width="21.12" height="16" rx="8" />
    <text class="value" x="624" y="13">4.4%</text>
  </g>
</svg>
